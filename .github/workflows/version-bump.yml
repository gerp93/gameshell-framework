name: Version Bump

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version part to bump'
        required: true
        type: choice
        options:
          - major
          - minor
          - patch

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Determine new version
        id: version
        run: |
          GIT_TAG_VERSION=$(git tag --list 'v*' --sort=-version:refname | head -n 1)
          if [[ -z "$GIT_TAG_VERSION" ]]; then
            echo "Exiting: git tag version not found"
            exit 1
          fi

          CURRENT_VERSION=${GIT_TAG_VERSION:1}
          REGEX_VALID_VERSION="([0-9]+)\.([0-9]+)\.([0-9]+)"
          if [[ ! "$CURRENT_VERSION" =~ ^$REGEX_VALID_VERSION$ ]]; then
            echo "Exiting: current version not valid ($CURRENT_VERSION)"
            exit 1
          fi

          VERSION_MAJOR=${BASH_REMATCH[1]}
          VERSION_MINOR=${BASH_REMATCH[2]}
          VERSION_PATCH=${BASH_REMATCH[3]}

          case "${{ inputs.bump }}" in
            major)
              VERSION_MAJOR=$((10#$VERSION_MAJOR + 1))
              VERSION_MINOR=0
              VERSION_PATCH=0
              ;;
            minor)
              VERSION_MINOR=$((10#$VERSION_MINOR + 1))
              VERSION_PATCH=0
              ;;
            patch)
              VERSION_PATCH=$((10#$VERSION_PATCH + 1))
              ;;
          esac

          NEW_VERSION="$VERSION_MAJOR.$VERSION_MINOR.$VERSION_PATCH"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Update README version line
        run: |
          sed -i -E 's/^Version: [0-9]+\.[0-9]+\.[0-9]+$/Version: ${{ steps.version.outputs.new_version }}/' README.md

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "v${{ steps.version.outputs.new_version }}"
          git tag -a "v${{ steps.version.outputs.new_version }}" -m "version v${{ steps.version.outputs.new_version }}"
          git push origin main
          git push origin "v${{ steps.version.outputs.new_version }}"
